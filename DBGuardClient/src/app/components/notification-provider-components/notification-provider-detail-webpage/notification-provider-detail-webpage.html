<p-toast key="provider-toast" position="bottom-right"></p-toast>
<p-confirmpopup></p-confirmpopup>
<div class="cards">
    @if (loadingProvider()) {
        <div class="loading-container">
            <p-progressspinner></p-progressspinner>
            <em>Loading provider info</em>
        </div>
    }
    @else {
        <p-card>
            <ng-template #header>
                <div class="card-header">
                    <h3>Notification provider</h3>
                    @if (authService.hasRoles(['Admin'])) {
                        <p-buttongroup>
                            @if (notificationProvider()?.providerType !== notificationTypes.Http) {
                                <p-button [loading]="testingProvider()" [text]="true" label="Test" icon="pi pi-play" severity="contrast" (onClick)="testProvider()" pTooltip="Test the notification provider to ensure it works"></p-button>
                            }
                            @if (notificationProvider()?.createdByUserId) {
                                <p-button [text]="true" label="Edit" icon="pi pi-pencil" (onClick)="editProvider()"></p-button>
                                <p-button [loading]="deletingProvider()" [text]="true" label="Delete" icon="pi pi-trash" severity="danger" (onClick)="deleteProviderClicked($event)"></p-button>
                            }
                        </p-buttongroup>
                    }
                </div>
            </ng-template>
            @if(notificationProvider()){
                <app-notification-provider-detail-pane
                    [notificationProvider]="notificationProvider()!"></app-notification-provider-detail-pane>
            }
        </p-card>
    }
    <p-card header="Notifications using this provider">
        <app-guard-notifications-table [providerId]="providerId()!"></app-guard-notifications-table>
    </p-card>
</div>
