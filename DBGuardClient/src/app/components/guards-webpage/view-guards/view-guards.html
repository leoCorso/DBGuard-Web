<!-- Filter drawer -->
<p-drawer [(visible)]="filterVisible" header="Filters">
    <app-guard-filters (filterChanged)="filtersChanged()" [(filters)]="filters"></app-guard-filters>
</p-drawer>


<p-dataview 
    #dataView
    [value]="dataItems()" 
    [lazy]="true" 
    [lazyLoadOnInit]="true" 
    [paginator]="true"
    [rows]="pageSize()"
    emptyMessage="No guards created"
    [first]=""
    [rowsPerPageOptions]="pageSizeOptions"
    [sortField]="sortControl.get('sortField')?.value"
    [sortOrder]="sortControl.get('sortOrder')?.value"
    (onLazyLoad)="loadDataPage($event)">
    <ng-template #header>
        <div class="view-header">
            <p-button label="Filter" icon="pi pi-filter" [text]="true" severity="secondary" pTooltip="Filter guard view" (onClick)="toggleFilterVisibility()"></p-button>
            <app-sort-select-control [formControl]="sortControl" [sortOptions]="sortOptions"></app-sort-select-control>
        </div>
    </ng-template>
    <ng-template #list let-items>
        @for(item of items; track $index){
            <app-view-guard-item [guardData]="item"></app-view-guard-item>
        }
    </ng-template>
</p-dataview>
