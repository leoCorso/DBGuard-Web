
<div>
    <div class="emails">
        <label for="emails"><strong>Emails</strong></label>
        <ul>
            @for (email of emailDetail().emails; track $index) {
                <li>{{ email }}</li>
            }
        </ul>
    </div>
    <div class="email-subject">
        <label for="email-subject"><strong>Email subject</strong></label>
        <p>{{ emailDetail().emailSubject }}</p>
    </div>
    <div class="email-body">
        <label for="email-body"><strong>Email body</strong></label>
        <p>{{ emailDetail().emailBody }}</p>
    </div>
</div>
