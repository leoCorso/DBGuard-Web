<div class="guard-filters">
    <p-button (onClick)="clearFilters()" icon="pi pi-filter-slash" severity="contrast" [link]="true" size="large" pTooltip="Clear filters"></p-button>
    @for(filter of filtersConfig; track $index){
        <app-filter-item (filterValueChanged)="onFilterValueChanged($event)" [filterConfig]="filter"></app-filter-item>
    }
</div>
